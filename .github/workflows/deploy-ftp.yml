# Build (npm run build) i wdrożenie folderu dist/ na serwer FTP po każdym pushu do main.
#
# Wymagane sekrety (Settings → Secrets and variables → Actions → New repository secret):
#   FTP_SERVER   — host bez ftp:// (np. ftp.twojadomena.pl)
#   FTP_USERNAME — login FTP
#   FTP_PASSWORD — hasło FTP
#
# Katalog na serwerze ustaw poniżej w server-dir (np. public_html, www, htdocs).
#
# Ważne: wiele hostingów po zalogowaniu FTP już otwiera katalog public_html (document root).
# Wtedy server-dir: public_html/ wgrywa pliki do public_html/public_html/ — strona w root
# domeny tego nie widzi. Sprawdź w panelu hostingu / FileZilla „katalog startowy” FTP i
# ustaw server-dir na ./ (root konta) albo usuń zagnieżdżenie — musi odpowiadać temu,
# co serwuje HTTP (np. public_html lub www).

name: Build and deploy (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: List build output (debug)
        run: ls -la dist/ && du -sh dist/

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/
          log-level: verbose
