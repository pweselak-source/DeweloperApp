# Build (npm run build) i wdrożenie folderu dist/ na serwer FTP po każdym pushu do main.
#
# Wymagane sekrety (Settings → Secrets and variables → Actions → New repository secret):
#   FTP_SERVER   — host bez ftp:// (np. ftp.twojadomena.pl)
#   FTP_USERNAME — login FTP
#   FTP_PASSWORD — hasło FTP
#
# Katalog na serwerze ustaw poniżej w server-dir (np. public_html, www, htdocs).

name: Build and deploy (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/
